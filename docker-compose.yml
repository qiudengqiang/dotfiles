services:
  dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.debian-bookworm
      args:
        BASE_IMAGE: ${BASE_IMAGE:-debian:bookworm-slim}
        GO_VERSION: ${GO_VERSION:-1.24.3}
    image: vinoqiu/terminal-env:stable
    container_name: ${CONTAINER_NAME:-terminal-env}
    volumes:
      - .:/opt/dotfile
      - ${HOME}:/work
    working_dir: /work
    stdin_open: true
    tty: true
